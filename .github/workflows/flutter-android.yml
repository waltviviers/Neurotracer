name: Build Neurotracer (Release + Debug)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  # ── Debug build — always runs, no signing needed ──────────────────────────
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Android scaffolding exists
        shell: bash
        run: |
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
            flutter create . --platforms=android
          fi

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Neurotracer-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ── Release build — requires keystore secrets ─────────────────────────────
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Android scaffolding exists
        shell: bash
        run: |
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
            flutter create . --platforms=android
          fi

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > neurotracer-release.jks
            cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../../neurotracer-release.jks
          EOF
            echo "Release keystore configured."
          else
            echo "KEYSTORE_BASE64 not set — skipping release build."
            exit 1
          fi

      - name: Build AAB (Play Store)
        run: flutter build appbundle --release

      - name: Build APK (sideload)
        run: flutter build apk --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neurotracer-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neurotracer-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish to GitHub Releases
        if: github.event_name != 'pull_request'
        run: |
          gh release delete latest-release --yes 2>/dev/null || true
          gh release create latest-release \
            --title "Neurotracer — latest release build" \
            --notes "Automatically published from \`${{ github.ref_name }}\`. AAB is for Play Store upload; APK can be sideloaded directly on Android." \
            --prerelease \
            build/app/outputs/bundle/release/app-release.aab#Neurotracer.aab \
            build/app/outputs/flutter-apk/app-release.apk#Neurotracer.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
