name: Build NeuroTrace APK (Debug)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Android scaffolding exists
        shell: bash
        run: |
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
            echo "Android scaffolding missing — creating it..."
            flutter create . --platforms=android
          else
            echo "Android scaffolding already present."
          fi

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NeuroTrace-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Publish to GitHub Releases
        if: success() && github.event_name != 'pull_request'
        run: |
          gh release delete latest-debug --yes 2>/dev/null || true
          gh release create latest-debug \
            --title "NeuroTrace — latest debug build" \
            --notes "Automatically published from branch \`${{ github.ref_name }}\` — install this APK directly on your Android device." \
            --prerelease \
            build/app/outputs/flutter-apk/app-debug.apk#NeuroTrace-debug.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
